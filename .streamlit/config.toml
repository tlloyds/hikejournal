[theme]
base = "light"
primaryColor = "#C56A35"
backgroundColor = "#F8FAF7"
secondaryBackgroundColor = "#EEF3EF"
textColor = "#14231B"
font = "sans-serif"
baseRadius = "6px"
buttonRadius = "6px"
borderColor = "#D3DED7"
showWidgetBorder = true

[theme.sidebar]
primaryColor = "#F2B16E"
backgroundColor = "#10291D"
secondaryBackgroundColor = "#1B3B2C"
textColor = "#F7FAF6"
borderColor = "#345344"
showWidgetBorder = true

[client]
toolbarMode = "minimal"

[server]
maxUploadSize = 64
runOnSave = false
fileWatcherType = "none"
